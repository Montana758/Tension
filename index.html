<!DOCTYPE html>
<html class="dark" lang="de">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
  <title>
   Rechner
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
   tailwind.config={darkMode:'class'}
  </script>
  <script crossorigin="" src="https://unpkg.com/react@18/umd/react.production.min.js">
  </script>
  <script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js">
  </script>
 </head>
 <body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen font-sans">
  <div id="root">
  </div>
  <script type="text/babel">
   const{useState,useMemo}=React;
   const T={de:{h1:"SIEB-RECHNER",title:"Messwerte",reset:"MESSUNGEN ZURÜCKSETZEN",avg:"ø Mittelwert",dev:"Δ Abweichung",p:{tl:"OL",tr:"OP",ct:"M",bl:"UL",br:"UP"}},ru:{h1:"ЗАМЕР СЕТКИ",title:"Показания",reset:"СБРОСИТЬ ВСЕ ЗАМЕРЫ",avg:"ø Среднее",dev:"Δ Разброс",p:{tl:"СЛ",tr:"СП",ct:"Ц",bl:"СИЛ",br:"СИП"}}};function SF({val,set}){const t=T[val.l];const ord=['tl','tr','ct','bl','br'];const pos=[{k:'tl',l:t.p.tl,c:'top-[8%] left-[6%]'},{k:'tr',l:t.p.tr,c:'top-[8%] right-[6%]'},{k:'ct',l:t.p.ct,c:'top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 scale-110 border-blue-500'},{k:'bl',l:t.p.bl,c:'bottom-[8%] left-[6%]'},{k:'br',l:t.p.br,c:'bottom-[8%] right-[6%]'}];const fmt=(s)=>{let c=s.replace(/,/g,'.').replace(/[^0-9.]/g,'');const d=c.split('.');if(d.length>2)c=d[0]+'.'+d.slice(1).join('');if(!c.includes('.')&&c.length===3)c=c.slice(0,2)+'.'+c.slice(2,3);if(c.includes('.')){const[i,de]=c.split('.');c=i.slice(0,2)+'.'+de.slice(0,1)}else{c=c.slice(0,2)}return c};const chg=(k,v)=>{const f=fmt(v);set(p=>({...p,[k]:f===''?null:parseFloat(f)}));if(f.includes('.')&&f.split('.')[1].length===1){const x=ord.indexOf(k);let nxt=null;for(let i=1;i<5;i++){const n=ord[(x+i)%5];if(val[n]===null||val[n]===''){nxt=n;break}}if(nxt){setTimeout(()=>{const e=document.getElementById('i-'+nxt);if(e){e.focus();e.select()}},50)}}};


window.screenKey=(key)=>{
 const el=document.getElementById('i-'+window.activeField);

 if(!el)return;

 chg(
   window.activeField,
   String(el.value||'')+key
 );
};

window.screenBackspace=()=>{
 const el=document.getElementById('i-'+window.activeField);

 if(!el)return;

 chg(
   window.activeField,
   String(el.value||'').slice(0,-1)
 );
};

const cls=(v)=>{if(v===null)return val.d?'border-slate-750 bg-slate-900':'border-slate-200 bg-white';return v<18?'border-amber-500 bg-amber-500/10 text-amber-500':v>24?'border-rose-500 bg-rose-500/10 text-rose-500':'border-emerald-500 bg-emerald-500/10 text-emerald-500'};return(<div class={`relative border-[16px] rounded-3xl aspect-[4/3] w-full max-w-md mx-auto ${val.d?'border-slate-800 bg-slate-950':'border-slate-300 bg-slate-100'}`}>{pos.map(({k,l,c})=>



<div
 key={k}
 class={`absolute w-[26%] rounded-xl border p-1 shadow-md text-center ${c} ${cls(val[k])} ${
   activeField===k
   ? 'ring-4 ring-yellow-400 shadow-yellow-400/50'
   : ''
 }`}
>

<label class="block text-[9px] text-slate-400 font-bold uppercase">{l}</label><div class="flex items-center justify-center gap-0.5">

{/*
<input
 id={'i-'+k}
 type="text"
 inputMode="decimal"
 value={val[k]===null?'':val[k]}
 onFocus={()=>{window.setActiveField?.(k);}}
 onClick={()=>{window.setActiveField?.(k);}}
 onChange={e=>chg(k,e.target.value)}
 class="w-full bg-transparent border-none outline-none text-center font-mono font-bold text-sm sm:text-base p-0 focus:ring-0"/>
*/}


<input
 id={'i-'+k}
 type="text"
 readOnly
 value={val[k]===null ? '' : val[k]}
 onFocus={()=>{window.setActiveField?.(k);}}
 onClick={()=>{window.setActiveField?.(k);}}
 class="w-full bg-transparent border-none outline-none text-center font-mono font-bold text-sm sm:text-base p-0 focus:ring-0 cursor-pointer"
/>

<span class="text-[9px] text-slate-400">{val.l==='de'?'N':'Н'}</span></div></div>)}</div>)}function App(){const[v,setV]=useState({tl:20.4,tr:19.6,ct:21.0,bl:18.6,br:21.6,l:'de',d:true});

const [activeField,setActiveField]=useState('ct');

window.setActiveField=setActiveField;
window.activeField=activeField;

const t=T[v.l];const m=useMemo(()=>{const x=Object.keys(v).filter(k=>k!=='l'&&k!=='d').map(k=>v[k]).filter(n=>n!==null);if(x.length===0)return{a:0,d:0};return{a:x.reduce((s,n)=>s+n,0)/x.length,d:Math.max(...x)-Math.min(...x)}},[v]);return(<div class={v.d?'dark bg-slate-950 text-slate-100 min-h-screen':'bg-slate-50 text-slate-800 min-h-screen'}><header class="h-14 flex items-center justify-between px-4 bg-slate-900 border-b border-slate-800 text-white"><h1 class="font-bold text-xs uppercase tracking-wider">{t.h1}</h1><div class="flex items-center gap-2"><div class="bg-slate-800 rounded p-0.5 flex text-[9px] border border-slate-700"><button onClick={()=>setV(p=>({...p,l:'de'}))} class={`px-1.5 py-0.5 rounded font-bold ${v.l==='de'?'bg-blue-600':''}`}>DE</button><button onClick={()=>setV(p=>({...p,l:'ru'}))} class={`px-1.5 py-0.5 rounded font-bold ${v.l==='ru'?'bg-blue-600':''}`}>RU</button></div><button onClick={()=>setV(p=>({...p,d:!p.d}))} class="p-1.5 bg-slate-800 rounded border border-slate-700 text-xs">{v.d?'☀️':'🌙'}</button></div></header><main class="max-w-md mx-auto p-4"><div class="p-4 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-2xl shadow-sm"><div class="flex justify-between items-center mb-4"><h2 class="text-xs font-bold text-slate-400 uppercase">{t.title}</h2></div><SF val={v} set={setV}/>

<div class="grid grid-cols-3 gap-2 mt-4">

 {[1,2,3,4,5,6,7,8,9].map(n=>(
  <button
   key={n}
   onClick={()=>window.screenKey(String(n))}
   class="py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold"
  >
   {n}
  </button>
 ))}

 <button
  onClick={window.screenBackspace}
  class="py-3 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-bold"
 >
  ⌫
 </button>

 <button
  onClick={()=>window.screenKey('0')}
  class="py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold"
 >
  0
 </button>

 <button
  onClick={()=>window.screenKey('.')}
  class="py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold"
 >
  .
 </button>

</div>


<button onClick={()=>setV(p=>({...p,tl:null,tr:null,ct:null,bl:null,br:null}))} class="w-full mt-4 py-3 bg-rose-600 hover:bg-rose-700 active:scale-[0.99] text-white font-extrabold text-xs uppercase tracking-widest rounded-xl shadow-md transition-all">{t.reset}</button><div class="grid grid-cols-2 gap-3 mt-4"><div class="p-3 bg-slate-100 dark:bg-slate-950/60 rounded-xl border dark:border-slate-800"><span class="text-[9px] font-bold text-slate-400 uppercase">{t.avg}</span><p class="text-lg font-black font-mono text-blue-500 mt-0.5">{m.a.toFixed(2)}</p></div><div class="p-3 bg-slate-100 dark:bg-slate-950/60 rounded-xl border dark:border-slate-800"><span class="text-[9px] font-bold text-slate-400 uppercase">{t.dev}</span><p class="text-lg font-black font-mono mt-0.5">{m.d.toFixed(2)}</p></div></div></div></main></div>)}const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
  </script>
 </body>
</html>
